name: Update Cyclone System

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scripts
        run: |
          node fetch.js
          node fetchNews.js

      - name: Commit changes
        run: |
          git config user.name "cyclone-bot"
          git config user.email "bot@cyclone.com"
          git add data.json news.json
          git diff --cached --quiet || git commit -m "update cyclone system"
          git push
