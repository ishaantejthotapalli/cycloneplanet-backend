name: Update Cyclone System
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run backend scripts
        run: |
          node fetch.js
          node fetchNews.js

      - name: Commit and push
        run: |
          git config user.name "cyclone-bot"
          git config user.email "bot@cyclone.com"
          git add data.json news.json
          git commit -m "auto update" || echo "no changes"
          git push
